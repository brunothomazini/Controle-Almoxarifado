<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Almoxarifado - USP</title>
    <style>
        :root {
            --usp-cinza: #f5f5f5;
            --usp-azul: #00509e;
            --usp-azul-escuro: #003366;
            --usp-dourado: #f5a623;
            --texto: #333;
            --borda: #ddd;
            --sombra: 0 2px 12px rgba(0,0,0,0.08);
            --arredondar: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--usp-cinza);
            color: var(--texto);
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, var(--usp-azul-escuro), var(--usp-azul));
            color: white;
            padding: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 1.5rem; font-weight: 600; }
        .header .sub { font-size: 0.85rem; opacity: 0.85; margin-top: 2px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .card {
            background: white;
            border-radius: var(--arredondar);
            box-shadow: var(--sombra);
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 1.15rem;
            color: var(--usp-azul);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--usp-cinza);
        }
        .search-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-box input, .search-box select {
            padding: 10px 14px;
            border: 1px solid var(--borda);
            border-radius: 6px;
            font-size: 0.95rem;
            flex: 1;
            min-width: 180px;
            outline: none;
            transition: border 0.2s;
        }
        .search-box input:focus, .search-box select:focus {
            border-color: var(--usp-azul);
            box-shadow: 0 0 0 3px rgba(0,80,158,0.1);
        }
        .btn {
            padding: 10px 24px;
            background: var(--usp-azul);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background: var(--usp-azul-escuro); }
        .btn-outline {
            background: transparent;
            color: var(--usp-azul);
            border: 1px solid var(--usp-azul);
        }
        .btn-outline:hover { background: var(--usp-cinza); }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: var(--arredondar);
            box-shadow: var(--sombra);
            padding: 18px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--usp-azul);
        }
        .stat-card .label {
            font-size: 0.85rem;
            color: #666;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: var(--usp-cinza);
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--usp-azul-escuro);
            border-bottom: 2px solid var(--borda);
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--usp-cinza);
        }
        tr:hover td { background: #fafafa; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .badge-ok { background: #e8f5e9; color: #2e7d32; }
        .badge-warn { background: #fff3e0; color: #e65100; }
        .badge-danger { background: #ffebee; color: #c62828; }
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-ok { background: #4caf50; }
        .dot-warn { background: #ff9800; }
        .dot-danger { background: #f44336; }
        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 0.85rem;
        }
        .empty { text-align: center; padding: 40px; color: #999; }
        .tag {
            display: inline-block;
            background: var(--usp-cinza);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #666;
        }
        .info-bar {
            margin-bottom: 12px;
            color: #666;
            font-size: 0.85rem;
        }
        .pagination {
            margin-top: 12px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .pagination .btn { padding: 6px 14px; font-size: 0.88rem; }
        .pagination span { font-size: 0.9rem; color: #555; }
        .ultima-atualizacao {
            font-size: 0.82rem;
            color: #999;
            text-align: center;
            margin-bottom: 16px;
        }
        @media (max-width: 768px) {
            .header-inner { flex-direction: column; text-align: center; gap: 8px; }
            .search-box { flex-direction: column; }
            .search-box input { min-width: auto; }
            .stats { grid-template-columns: 1fr 1fr; }
            table { font-size: 0.8rem; }
            th, td { padding: 6px 8px; }
        }
    </style>
</head>

        const ITENS = DADOS.itens;
        const CATEGORIAS = DADOS.categorias;
        const POR_PAGINA = 50;
        let paginaAtual = 1;
        let itensFiltrados = [];

        // ====== STATS ======
        document.getElementById('totalItens').textContent = DADOS.total;
        document.getElementById('totalCategorias').textContent = DADOS.total_categorias;
        document.getElementById('totalDisponiveis').textContent = DADOS.total_disponiveis;
        document.getElementById('totalIndisponiveis').textContent = DADOS.total_indisponiveis;

        // ====== CATEGORIAS DROPDOWN ======
        const selCat = document.getElementById('searchCategoria');
        CATEGORIAS.forEach(function(c) {
            var opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            selCat.appendChild(opt);
        });

        // ====== DATA ======
        var agora = new Date();
        var dataStr = agora.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        document.getElementById('ultimaAtualizacao').textContent = 'Ultima atualizacao: ' + dataStr;
        document.getElementById('dataExport').textContent = dataStr;

        // ====== STATUS BADGE ======
        function statusBadge(item) {
            var s = item.status || 'disponivel';
            var map = {
                'disponivel': ['Disponivel', 'badge-ok', 'dot-ok'],
                'emprestado': ['Emprestado', 'badge-warn', 'dot-warn'],
                'manutencao': ['Manutencao', 'badge-warn', 'dot-warn'],
                'baixado': ['Baixado', 'badge-danger', 'dot-danger'],
                'reservado': ['Reservado', 'badge-warn', 'dot-warn']
            };
            var arr = map[s] || ['Desconhecido', 'badge-warn', 'dot-warn'];
            return '<span class="status-indicator"><span class="dot ' + arr[2] + '"></span><span class="badge ' + arr[1] + '">' + arr[0] + '</span></span>';
        }

        // ====== FILTER ======
        function filtrar() {
            var codigo = document.getElementById('searchCodigo').value.trim().toLowerCase();
            var nome = document.getElementById('searchNome').value.trim().toLowerCase();
            var categoria = document.getElementById('searchCategoria').value;

            itensFiltrados = ITENS.filter(function(item) {
                if (codigo && item.codigo.toLowerCase().indexOf(codigo) === -1) return false;
                if (nome && item.nome.toLowerCase().indexOf(nome) === -1) return false;
                if (categoria && item.categoria !== categoria) return false;
                return true;
            });

            paginaAtual = 1;
            renderizar();
        }

        function limpar() {
            document.getElementById('searchCodigo').value = '';
            document.getElementById('searchNome').value = '';
            document.getElementById('searchCategoria').value = '';
            itensFiltrados = ITENS.slice();
            paginaAtual = 1;
            renderizar();
        }

        // ====== RENDER ======
        function renderizar() {
            var div = document.getElementById('resultados');
            var total = itensFiltrados.length;
            var totalPaginas = Math.max(1, Math.ceil(total / POR_PAGINA));

            if (paginaAtual > totalPaginas) paginaAtual = totalPaginas;
            if (paginaAtual < 1) paginaAtual = 1;

            var inicio = (paginaAtual - 1) * POR_PAGINA;
            var fim = Math.min(inicio + POR_PAGINA, total);
            var paginaItens = itensFiltrados.slice(inicio, fim);

            if (total === 0) {
                div.innerHTML = '<div class="empty">Nenhum item encontrado</div>';
                return;
            }

            var html = '<div class="info-bar">Mostrando ' + (inicio + 1) + '-' + fim + ' de ' + total + ' item(ns)</div>';
            html += '<table><thead><tr>';
            html += '<th>Codigo</th><th>Nome</th><th>Nome Comercial</th><th>Marca</th><th>Categoria</th>';
            html += '<th>Pedidos por:</th><th>Status</th>';
            html += '</tr></thead><tbody>';

            for (var i = 0; i < paginaItens.length; i++) {
                var item = paginaItens[i];
                html += '<tr>';
                html += '<td><strong>' + (item.codigo || '-') + '</strong></td>';
                html += '<td>' + (item.nome || '-') + '</td>';
                html += '<td>' + (item.nome_comercial || '-') + '</td>';
                html += '<td>' + (item.fabricante || '-') + '</td>';
                html += '<td><span class="tag">' + (item.categoria || 'N/A') + '</span></td>';
                html += '<td>' + (item.pedidos_info || 'Almox') + '</td>';
                html += '<td>' + statusBadge(item) + '</td>';
                html += '</tr>';
            }

            html += '</tbody></table>';

            if (totalPaginas > 1) {
                html += '<div class="pagination">';
                if (paginaAtual > 1) {
                    html += '<button class="btn btn-outline" onclick="irPagina(' + (paginaAtual - 1) + ')">&laquo; Anterior</button>';
                }
                html += '<span>Pagina ' + paginaAtual + ' de ' + totalPaginas + '</span>';
                if (paginaAtual < totalPaginas) {
                    html += '<button class="btn btn-outline" onclick="irPagina(' + (paginaAtual + 1) + ')">Proxima &raquo;</button>';
                }
                html += '</div>';
            }

            div.innerHTML = html;
        }

        function irPagina(p) {
            if (p < 1) return;
            paginaAtual = p;
            renderizar();
        }

        // ====== INIT ======
        itensFiltrados = ITENS.slice();
        renderizar();
    </script>
